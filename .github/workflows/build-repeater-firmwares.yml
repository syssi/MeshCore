name: Build Repeater Firmwares

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'repeater-*'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build Firmwares
        env:
          FIRMWARE_VERSION: ${{ env.GIT_TAG_VERSION }}
        run: /usr/bin/env bash build.sh build-repeater-firmwares

      - name: Build Debug Firmwares
        env:
          FIRMWARE_VERSION: ${{ env.GIT_TAG_VERSION }}
          PLATFORMIO_BUILD_FLAGS: -DMESH_PACKET_LOGGING=1
          FIRMWARE_LABEL: debug-
          SKIP_CLEAN: "1"
        run: /usr/bin/env bash build.sh build-repeater-firmwares

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repeater-firmwares
          path: out

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "Repeater Firmware ${{ env.GIT_TAG_VERSION }}" \
            --notes ""
          for f in out/*; do
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done